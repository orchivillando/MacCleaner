name: Build & Release DMG

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Package
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build MacCleaner
        run: |
          xcodebuild \
            -project MacCleaner.xcodeproj \
            -target MacCleaner \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="${PWD}/build" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            MACOSX_DEPLOYMENT_TARGET=13.0 \
            build

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dmg_staging dist

          cp -R "build/MacCleaner.app" dmg_staging/
          ln -s /Applications "dmg_staging/Applications"

          hdiutil create \
            -volname "MacCleaner" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            "dist/MacCleaner-${VERSION}.dmg"

          echo "DMG_FILE=dist/MacCleaner-${VERSION}.dmg" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacCleaner-dmg
          path: dist/*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "MacCleaner ${{ github.ref_name }}"
          body: |
            ## ✨ MacCleaner ${{ github.ref_name }} — Enterprise Edition

            A full-featured macOS cleaner app inspired by CleanMyMac Pro.

            ### 🚀 What's New in v2.0.0
            - **Menu Bar Icon** — live disk usage in your menu bar
            - **Dashboard** — real-time disk & memory rings
            - **Smart Scan** — scan all 9 junk categories at once
            - **System Junk** — User Caches, Logs, Temp, Trash, Mail, Xcode, iOS Simulator
            - **Large Files** — find files >50 MB across Downloads, Documents, Desktop, Movies
            - **App Uninstaller** — remove apps + leftover Library files
            - **Privacy Cleaner** — Safari, Chrome, Firefox history & cache
            - **Memory Boost** — reclaim inactive RAM
            - **Maintenance** — flush DNS, QuickLook cache, font cache, Spotlight re-index

            ### 📥 How to Install
            1. Download **MacCleaner-${{ github.ref_name }}.dmg** below
            2. Open DMG → drag **MacCleaner.app** to **Applications**
            3. First launch: **right-click → Open** to bypass Gatekeeper

            > ⚠️ App is ad-hoc signed only. Always right-click → Open on first launch.
          files: dist/*.dmg
          draft: false
          prerelease: false

